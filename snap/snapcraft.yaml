name: opencode
adopt-info: opencode
title: OpenCode
summary: The open source AI coding agent
description: |
  OpenCode is a fully open source AI-powered coding agent that runs in
  the terminal. It supports multiple AI providers including Claude,
  OpenAI, Google, and local models. Features include interactive TUI,
  built-in LSP support, a client/server architecture, and two built-in
  agents (coder and planner) for development and code exploration tasks.

  OpenCode can edit files, run commands, search codebases, and interact
  with MCP servers, making it a versatile coding assistant directly in
  the terminal.
license: MIT
website: https://opencode.ai
contact: https://github.com/anomalyco/opencode/issues
issues: https://github.com/anomalyco/opencode/issues
source-code: https://github.com/anomalyco/opencode
base: core24
confinement: classic
grade: stable

platforms:
  amd64:
  arm64:

apps:
  opencode:
    command: bin/opencode

parts:
  opencode:
    plugin: nil
    source: https://github.com/anomalyco/opencode.git
    source-branch: dev
    source-type: git
    build-packages:
      - curl
      - unzip
      - git
      - jq
      - build-essential
      - python3
      - pkg-config
      - patchelf
    override-pull: |
      craftctl default
      craftctl set version="$(jq -r .version packages/opencode/package.json)"
    override-build: |
      # Install Bun
      curl -fsSL https://bun.sh/install | bash
      export BUN_INSTALL="$HOME/.bun"
      export PATH="$BUN_INSTALL/bin:$PATH"
      
      # Install dependencies
      bun install
      
      # Build standalone binary for current platform
      cd packages/opencode
      bun run script/build.ts --single
      
      # Determine architecture
      case "$(uname -m)" in
        x86_64)  ARCH="x64" ;;
        aarch64) ARCH="arm64" ;;
        *)       echo "Unsupported architecture: $(uname -m)" && exit 1 ;;
      esac
      
      # Install the compiled binary
      mkdir -p "$SNAPCRAFT_PART_INSTALL/bin"
      cp "dist/opencode-linux-${ARCH}/bin/opencode" "$SNAPCRAFT_PART_INSTALL/bin/opencode"

      # Patch ELF interpreter and rpath to use snap's core24 libraries.
      # This is required for classic confinement best practices so the binary
      # uses the snap's own libc rather than the host's.
      case "$(uname -m)" in
        x86_64)
          ELF_INTERP="/snap/core24/current/lib64/ld-linux-x86-64.so.2"
          ELF_RPATH="/snap/core24/current/lib/x86_64-linux-gnu"
          ;;
        aarch64)
          ELF_INTERP="/snap/core24/current/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1"
          ELF_RPATH="/snap/core24/current/lib/aarch64-linux-gnu"
          ;;
      esac
      patchelf \
        --set-interpreter "$ELF_INTERP" \
        --set-rpath "$ELF_RPATH" \
        "$SNAPCRAFT_PART_INSTALL/bin/opencode"
